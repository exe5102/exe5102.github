{% extends 'AdminBase.html' %}

{% block header %}
<h2>訂位取消</h2>
<p>請在下方輸入訂位的車牌號碼</p>
{% endblock %}

{% block box %}
<div class="row">
    <div class="col-12">
        <!-- Text -->
        <section class="box">
            <form action="/admindelete" method="post">
                <div class="row gtr-uniform gtr-50">
                    <div class="col-9 col-12-mobilep">
                        <input type="text" name="Unumber" id="Unumber" value="" placeholder="車牌號碼" />
                    </div>
                    <div class="col-3 col-12-mobilep">
                        <input type="submit" value="Enter" class="fit" />
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>
{% endblock %}
