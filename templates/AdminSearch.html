{% extends 'AdminBase.html' %}

{% block header %}
<h2>訂位查詢</h2>
<p>請在下方輸入客戶的車牌號碼</p>
{% endblock %}

{% block box %}
<div class="row">
    <div class="col-12">
        <!-- Text -->
        <section class="box">
            <form action="/adminsearch" method="post">
                <div class="row gtr-uniform gtr-50">
                    <div class="col-9 col-12-mobilep">
                        <input type="text" name="Unumber" id="Unumber" value="" placeholder="車牌號碼" />
                    </div>
                    <div class="col-3 col-12-mobilep">
                        <input type="submit" value="Enter" class="fit" />
                    </div>
                </div>
            </form>
        </section>
    </div>
</div>
<div class="row">
    <div class="col-12">
        <!-- Table -->
        <section class="box">
            <h3>查詢結果</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th><h4>電話</h4></th>
                            <th><h4>車位號</h4></th>
                            <th><h4>車牌號碼</h4></th>
                            <th><h4>時段</h4></th>
                            <th><h4>金額</h4></th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if DBfatch %}
                        <tr>
                            <td>{{ DBfatch[0] }}</td>
                            <td>{{ DBfatch[1] }}</td>
                            <td>{{ DBfatch[2] }}</td>
                            <td>{{ DBfatch[3] }}</td>
                            <td>{{ Pamount }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
            <ul class="actions special">
                <li><a href="{{ url_for('Administration') }}#booking" class="button primary">回管理端首頁</a></li>
            </ul>
        </section>
    </div>
</div>
{% endblock %}
